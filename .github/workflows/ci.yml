name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

jobs:
  tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Compile plugin and tests
        run: python -m py_compile adapter.py tests/test_plugin_package.py tests/conftest.py

      - name: Run tests
        run: PYTHONPATH=. pytest -q

      - name: Verify package and plugin versions match
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib

          pyproject = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          package_version = pyproject['project']['version']
          plugin_text = pathlib.Path('plugin.yaml').read_text()
          match = re.search(r'^version:\s*([^\s#]+)', plugin_text, re.M)
          if not match:
              raise SystemExit('plugin.yaml is missing a top-level version')
          plugin_version = match.group(1)
          if package_version != plugin_version:
              raise SystemExit(
                  f'version mismatch: pyproject.toml={package_version}, plugin.yaml={plugin_version}'
              )
          print(f'versions aligned: {package_version}')
          PY
