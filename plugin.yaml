name: fluxer-platform
label: Fluxer
kind: platform
version: 0.1.1
description: >
  Fluxer gateway adapter for Hermes Agent. Native Fluxer integration using
  Fluxer's bot REST API for outbound messages, Gateway WebSocket events for
  inbound dispatches, message edits, reactions, pins, reply references,
  media delivery, and channel-directory enumeration. Component buttons are
  deployment-dependent and approval prompts include visible slash-command
  fallback text; native slash commands and Discord-style threads are also
  deployment-dependent.
author: Hermes Fluxer Plugin Contributors
requires_env:
  - name: FLUXER_BOT_TOKEN
    description: "Fluxer bot token (<applicationId>.<secret>)"
    prompt: "Fluxer bot token"
    password: true
optional_env:
  - name: FLUXER_BASE_URL
    description: "Fluxer API base URL for self-hosted instances; defaults to https://api.fluxer.app/v1"
    prompt: "Fluxer base URL"
    password: false
  - name: FLUXER_ALLOWED_USERS
    description: "Comma-separated Fluxer user IDs allowed to talk to the bot"
    prompt: "Allowed Fluxer user IDs"
    password: false
  - name: FLUXER_ALLOW_ALL_USERS
    description: "Allow any Fluxer user to talk to the bot"
    prompt: "Allow all Fluxer users? (true/false)"
    password: false
  - name: FLUXER_HOME_CHANNEL
    description: "Default Fluxer channel/DM ID for cron and notifications"
    prompt: "Home channel ID"
    password: false
  - name: FLUXER_HOME_CHANNEL_NAME
    description: "Human label for the home channel"
    prompt: "Home channel display name"
    password: false
  - name: FLUXER_GATEWAY_URL
    description: "Override Fluxer Gateway WebSocket URL; normally discovered via /gateway/bot"
    prompt: "Gateway WebSocket URL"
    password: false
  - name: FLUXER_BACKLOG_RECOVERY
    description: "Recover recent channel messages after reconnect/startup (true/false)"
    prompt: "Enable backlog recovery?"
    password: false
  - name: FLUXER_BACKLOG_LIMIT
    description: "Maximum recent messages to scan per known channel during backlog recovery"
    prompt: "Backlog recovery limit"
    password: false
  - name: FLUXER_BACKLOG_BOOTSTRAP_SECONDS
    description: "Startup lookback window, in seconds, when no previous disconnect time exists"
    prompt: "Backlog bootstrap seconds"
    password: false
  - name: FLUXER_REQUIRE_MENTION
    description: "Require bot mention/direct address in non-home channels (true/false)"
    prompt: "Require mention in channels?"
    password: false
  - name: FLUXER_STRICT_MENTION
    description: "Require a fresh mention on every channel message, ignoring mentioned-thread memory"
    prompt: "Strict mention mode?"
    password: false
  - name: FLUXER_FREE_RESPONSE_CHANNELS
    description: "Comma-separated channel IDs where Fluxer responds without mention"
    prompt: "Free-response channel IDs"
    password: false
  - name: FLUXER_HOME_GUILD_ID
    description: "Fluxer guild/community ID treated as the user's home Hermes workspace"
    prompt: "Home guild ID"
    password: false
  - name: FLUXER_HOME_GUILDS
    description: "Comma-separated Fluxer guild/community IDs treated as home Hermes workspaces"
    prompt: "Home guild IDs"
    password: false
  - name: FLUXER_AUTO_FREE_RESPONSE_HOME_GUILD
    description: "Respond without mention in channels inside configured home guilds (true/false)"
    prompt: "Auto free-response in home guilds?"
    password: false
  - name: FLUXER_MENTION_GATED_CHANNELS
    description: "Comma-separated channel IDs that still require mentions even in auto-free-response home guilds"
    prompt: "Mention-gated channel IDs"
    password: false
  - name: FLUXER_ALLOWED_CHANNELS
    description: "Comma-separated channel IDs where Fluxer is allowed to respond; empty means all"
    prompt: "Allowed channel IDs"
    password: false
  - name: FLUXER_MENTION_PATTERNS
    description: "Comma-separated regexes that count as direct bot mentions"
    prompt: "Mention regex patterns"
    password: false
  - name: FLUXER_ALLOW_MENTION_EVERYONE
    description: "Permit outbound @everyone/@here mentions instead of neutralizing them"
    prompt: "Allow @everyone/@here?"
    password: false
  - name: FLUXER_ALLOW_MENTION_ROLES
    description: "Permit outbound Fluxer role mentions instead of neutralizing them"
    prompt: "Allow role mentions?"
    password: false
  - name: FLUXER_ALLOW_MENTION_USERS
    description: "Permit outbound user mentions"
    prompt: "Allow user mentions?"
    password: false
  - name: FLUXER_ALLOW_MENTION_REPLIED_USER
    description: "Permit reply notifications to the replied-to user when Fluxer supports allowed_mentions"
    prompt: "Mention replied user?"
    password: false
  - name: FLUXER_DELIVERY_VERIFICATION
    description: "Read back sent/edited messages to verify delivery when possible"
    prompt: "Enable delivery verification?"
    password: false
  - name: FLUXER_REGISTER_NATIVE_COMMANDS
    description: "Register Hermes slash commands with Fluxer on gateway connect"
    prompt: "Register native Fluxer slash commands?"
    password: false
  - name: FLUXER_APPLICATION_ID
    description: "Fluxer application ID for native command registration; defaults to token prefix"
    prompt: "Fluxer application ID"
    password: false
  - name: FLUXER_NATIVE_COMMAND_GUILDS
    description: "Comma-separated guild IDs for guild-scoped command registration; empty means global"
    prompt: "Native command guild IDs"
    password: false
  - name: FLUXER_VOICE_ENABLED
    description: "Enable the realtime Fluxer voice bridge (true/false); disabled by default"
    prompt: "Enable realtime Fluxer voice?"
    password: false
  - name: FLUXER_VOICE_AUTO_JOIN
    description: "Automatically join configured voice rooms when a target user joins (true/false)"
    prompt: "Auto-join voice rooms?"
    password: false
  - name: FLUXER_VOICE_SUPERVISOR_DISABLED
    description: "Internal recursion guard for child voice scripts; leave empty/false in normal plugin configuration"
    prompt: "Disable voice supervisor lifecycle guard?"
    password: false
  - name: FLUXER_VOICE_TARGET_USER_IDS
    description: "Comma-separated Fluxer user IDs whose LiveKit audio may be captured; empty means no targeted capture"
    prompt: "Realtime voice target user IDs"
    password: false
  - name: FLUXER_VOICE_CHANNEL_IDS
    description: "Comma-separated Fluxer voice channel IDs the bridge may join; empty disables auto-join"
    prompt: "Allowed realtime voice channel IDs"
    password: false
  - name: FLUXER_VOICE_GUILD_IDS
    description: "Optional comma-separated Fluxer guild/community IDs allowed for realtime voice"
    prompt: "Allowed realtime voice guild IDs"
    password: false
  - name: FLUXER_VOICE_PARTICIPANT_PREFIX
    description: "Optional LiveKit participant identity prefix to capture; defaults to user_<targetUserId>_ when one target user is configured"
    prompt: "LiveKit participant identity prefix"
    password: false
  - name: FLUXER_VOICE_BRAIN_PROVIDER
    description: "Voice brain mode: hermes (recommended full-session default), auto, xai-fast, or xai"
    prompt: "Voice brain provider"
    password: false
  - name: FLUXER_VOICE_STT_PROVIDER
    description: "Realtime voice STT provider: auto, local, groq, xai, or elevenlabs"
    prompt: "Voice STT provider"
    password: false
  - name: FLUXER_VOICE_STT_MODEL
    description: "Realtime voice STT model name"
    prompt: "Voice STT model"
    password: false
  - name: FLUXER_VOICE_ELEVENLABS_LANGUAGE_CODE
    description: "Optional ElevenLabs Scribe language code; empty allows autodetect"
    prompt: "ElevenLabs STT language code"
    password: false
  - name: FLUXER_VOICE_TTS_VOICE
    description: "Realtime TTS voice name used by the configured realtime voice provider"
    prompt: "Realtime TTS voice"
    password: false
  - name: FLUXER_VOICE_CAPTURE_TIMEOUT_SECONDS
    description: "Maximum seconds to wait for a user's voice segment before timing out"
    prompt: "Voice capture timeout seconds"
    password: false
  - name: FLUXER_VOICE_SILENCE_MS
    description: "VAD silence duration, in milliseconds, that ends a spoken turn"
    prompt: "Voice VAD silence ms"
    password: false
  - name: FLUXER_VOICE_END_PADDING_MS
    description: "Milliseconds of final silence retained in captured audio"
    prompt: "Voice end padding ms"
    password: false
  - name: FLUXER_VOICE_MIN_SEGMENT_MS
    description: "Minimum captured voice segment duration in milliseconds"
    prompt: "Voice minimum segment ms"
    password: false
  - name: FLUXER_VOICE_MAX_SEGMENT_SECONDS
    description: "Maximum captured voice segment duration in seconds"
    prompt: "Voice maximum segment seconds"
    password: false
  - name: FLUXER_VOICE_MAX_RUNTIME_SECONDS
    description: "Maximum runtime for one voice loop process in seconds"
    prompt: "Voice loop max runtime seconds"
    password: false
  - name: FLUXER_VOICE_CONTEXT_FILE
    description: "Optional local context file loaded into fast voice mode; not required and never bundled with private user data"
    prompt: "Voice context file path"
    password: false
  - name: FLUXER_VOICE_SESSION_DB
    description: "Optional Hermes session database path for full-brain temporal recall"
    prompt: "Voice session DB path"
    password: false
  - name: FLUXER_VOICE_TURN_LOG_JSONL
    description: "Optional JSONL path for realtime voice turn diagnostics"
    prompt: "Voice turn log path"
    password: false
  - name: FLUXER_VOICE_CONNECT_TIMEOUT_SECONDS
    description: "Maximum seconds to wait for LiveKit/gateway voice connection setup"
    prompt: "Voice connect timeout seconds"
    password: false
  - name: FLUXER_VOICE_XAI_TIMEOUT_SECONDS
    description: "Maximum seconds to wait for one realtime TTS/audio response"
    prompt: "Voice xAI timeout seconds"
    password: false
  - name: FLUXER_VOICE_XAI_FIRST_AUDIO_TIMEOUT_SECONDS
    description: "Maximum seconds to wait for the first realtime audio delta"
    prompt: "Voice first-audio timeout seconds"
    password: false
  - name: FLUXER_VOICE_HERMES_URL
    description: "Hermes API base URL for full-brain voice mode"
    prompt: "Voice Hermes API URL"
    password: false
  - name: FLUXER_VOICE_HERMES_MODEL
    description: "Hermes API model name used for full-brain voice mode"
    prompt: "Voice Hermes model"
    password: false
  - name: FLUXER_VOICE_HERMES_TIMEOUT_SECONDS
    description: "Maximum seconds to wait for full-brain Hermes voice responses"
    prompt: "Voice Hermes timeout seconds"
    password: false
  - name: FLUXER_VOICE_HERMES_MAX_TOKENS
    description: "Maximum tokens for full-brain Hermes voice responses"
    prompt: "Voice Hermes max tokens"
    password: false
  - name: FLUXER_VOICE_HERMES_TEMPERATURE
    description: "Sampling temperature for full-brain Hermes voice responses"
    prompt: "Voice Hermes temperature"
    password: false
  - name: FLUXER_VOICE_HERMES_SESSION_ID
    description: "Optional stable Hermes session id for persisted full-brain voice turns; defaults to the Fluxer voice room identity"
    prompt: "Voice Hermes session ID"
    password: false
  - name: FLUXER_VOICE_HERMES_SESSION_KEY
    description: "Optional stable Hermes long-term memory key for persisted full-brain voice turns; defaults to the Fluxer voice room identity"
    prompt: "Voice Hermes session key"
    password: false
  - name: FLUXER_VOICE_MAX_TURNS
    description: "Maximum turns handled by one voice loop process"
    prompt: "Voice max turns"
    password: false
  - name: FLUXER_VOICE_INITIAL_SETTLE_SECONDS
    description: "Seconds to wait after joining before capturing the first voice turn"
    prompt: "Voice initial settle seconds"
    password: false
  - name: FLUXER_VOICE_SAMPLE_RATE
    description: "PCM sample rate used for capture and publish"
    prompt: "Voice sample rate"
    password: false
  - name: FLUXER_VOICE_FRAME_MS
    description: "Audio frame duration in milliseconds"
    prompt: "Voice frame ms"
    password: false
  - name: FLUXER_VOICE_ENERGY_THRESHOLD
    description: "RMS threshold used by simple VAD"
    prompt: "Voice VAD energy threshold"
    password: false
  - name: FLUXER_VOICE_START_COOLDOWN_SECONDS
    description: "Cooldown before starting another auto-join voice loop"
    prompt: "Voice auto-join start cooldown seconds"
    password: false
  - name: FLUXER_VOICE_STOP_TIMEOUT_SECONDS
    description: "Seconds to wait for a voice child process to stop gracefully"
    prompt: "Voice stop timeout seconds"
    password: false
  - name: FLUXER_VOICE_PYTHON
    description: "Optional Python executable used to launch the voice supervisor/loop"
    prompt: "Voice Python executable"
    password: false
